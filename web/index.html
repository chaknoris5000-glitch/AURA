<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AURA — здесь и сейчас</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            padding: 16px 24px 12px 24px;
            border-bottom: 1px solid #1c1c1c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: #0a0a0a;
        }

        #header h1 {
            font-size: 0.9rem;
            font-weight: 400;
            color: #888;
            letter-spacing: 0.04em;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 8px 24px;
            scroll-behavior: smooth;
            width: 100%;
            background: #0a0a0a;
        }

        .msg {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.25s ease;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.bot {
            align-items: flex-start;
        }

        .msg .bubble {
            max-width: 92%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            background: #141414;
            color: #e8e8e8;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .msg.user .bubble {
            background: #1a1a1a;
            color: #e8e8e8;
            border-bottom-right-radius: 4px;
        }

        .msg.bot .bubble {
            background: #111111;
            border-bottom-left-radius: 4px;
        }

        .timestamp {
            font-size: 0.7rem;
            color: #555;
            margin-top: 4px;
            padding: 0 6px;
            letter-spacing: 0.02em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #chat::-webkit-scrollbar {
            width: 4px;
        }
        #chat::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        #chat::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 8px;
        }

        #input-area {
            flex-shrink: 0;
            padding: 12px 24px 20px 24px;
            background: #0a0a0a;
            border-top: 1px solid #1c1c1c;
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        #input-area .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            padding: 4px 8px;
            transition: border 0.2s;
        }

        #input-area .input-wrapper:focus-within {
            border-color: #d4af37;
        }

        #input-area .input-wrapper input {
            flex: 1;
            padding: 10px 12px;
            background: transparent;
            border: none;
            color: #e8e8e8;
            font-size: 1rem;
            outline: none;
        }

        #input-area .input-wrapper input::placeholder {
            color: #555;
        }

        #input-area .input-wrapper button {
            background: transparent;
            border: none;
            color: #888;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }

        #input-area .input-wrapper button:hover {
            background: #1c1c1c;
            color: #d4af37;
        }

        #input-area .send-btn {
            padding: 10px 24px;
            border: 1px solid #d4af37;
            border-radius: 40px;
            background: transparent;
            color: #d4af37;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }

        #input-area .send-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
        }

        #input-area .send-btn:disabled {
            opacity: 0.4;
            cursor: default;
            border-color: #888;
            color: #888;
        }

        @media (max-width: 700px) {
            #chat { padding: 16px 16px 8px 16px; }
            #input-area { padding: 10px 16px 16px 16px; }
            .msg .bubble { font-size: 0.95rem; padding: 10px 14px; }
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>диалог</h1>
    </div>

    <div id="chat">
        <div class="msg bot">
            <div class="bubble">Здесь и сейчас. Я — AURA. Чем могу помочь?</div>
            <div class="timestamp">сейчас</div>
        </div>
    </div>

    <div id="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Напиши что-нибудь..." autofocus />
        </div>
        <button class="send-btn" id="send-btn">Отправить</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function getTime() {
            return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            const time = document.createElement('div');
            time.className = 'timestamp';
            time.textContent = getTime();

            div.appendChild(bubble);
            div.appendChild(time);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            sendBtn.disabled = true;
            input.disabled = true;

            try {
                const res = await fetch('/webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 'web_user', text: text })
                });
                const data = await res.json();
                const reply = data.reply || 'Нет ответа';
                addMessage('bot', reply);
            } catch (e) {
                console.error('Error:', e);
                addMessage('bot', 'Ошибка соединения. Попробуй позже.');
            }

            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }

        sendBtn.onclick = sendMessage;
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };

        input.focus();
    </script>

</body>
</html>
